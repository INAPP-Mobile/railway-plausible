<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5850ec"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="40" fill="url(#bg)"/>
  <!-- Plausible-style chart icon -->
  <rect x="200" y="500" width="80" height="160" rx="12" fill="url(#accent)" opacity="0.7"/>
  <rect x="310" y="350" width="80" height="310" rx="12" fill="url(#accent)" opacity="0.85"/>
  <rect x="420" y="250" width="80" height="410" rx="12" fill="url(#accent)"/>
  <rect x="530" y="180" width="80" height="480" rx="12" fill="url(#accent)" opacity="0.6"/>
  <!-- Baseline -->
  <line x1="160" y1="520" x2="640" y2="520" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>
  <!-- Arrow up trend line -->
  <polyline points="220,500 350,380 460,300 570,220" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="570,220 560,250 585,245" fill="#4ade80"/>
  <!-- Text -->
  <text x="400" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="48" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Plausible CE</text>
  <text x="400" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">Railway Template</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1E1B4B"/><stop offset="100%" stop-color="#0A0A1A"/></linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#5850EC"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#4ADE80"/><stop offset="100%" stop-color="#22C55E"/></linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#5850EC"/><stop offset="100%" stop-color="#6366F1"/></linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <circle cx="400" cy="410" r="190" stroke="#5850EC" stroke-width="1.5" opacity="0.1"/>
  <!-- Bar chart -->
  <g transform="translate(400,430)">
    <rect x="-140" y="-80" rx="10" width="50" height="140" fill="url(#bar1)" opacity="0.8"/>
    <rect x="-70" y="-200" rx="10" width="50" height="260" fill="url(#bar2)" opacity="0.7"/>
    <rect x="0" y="-140" rx="10" width="50" height="200" fill="url(#bar3)" opacity="0.75"/>
    <rect x="70" y="-100" rx="10" width="50" height="160" fill="url(#bar1)" opacity="0.6"/>
    <!-- Baseline -->
    <line x1="-170" y1="60" x2="150" y2="60" stroke="#94A3B8" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  </g>
</svg>